<svg viewBox="0 0 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro exato com as configurações de drop-shadow solicitadas -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff003c" flood-opacity="1" result="shadow1" />
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff003c" flood-opacity="0.8" result="shadow2" />
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#ff003c" flood-opacity="0.45" result="shadow3" />
      <feMerge>
        <feMergeNode in="shadow3" />
        <feMergeNode in="shadow2" />
        <feMergeNode in="shadow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Camada principal: Traços finos e legíveis com glow -->
  <g fill="none" stroke="#ff003c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)">
    <!-- O "C" que envolve o conjunto (aberto na direita) -->
    <path d="M 312 100 A 150 150 0 1 0 312 300" />
    
    <!-- Letra J (Separada, limpa) -->
    <path d="M 150 130 L 150 247 A 23 23 0 0 1 104 247 L 104 225" />
    
    <!-- Letra H (Centralizada, legível) -->
    <path d="M 172 130 L 172 270 M 218 130 L 218 270 M 172 200 L 218 200" />
    
    <!-- Letra M (Proporcional ao J e H, com abertura clara para o C) -->
    <path d="M 240 270 L 240 130 L 263 200 L 286 130 L 286 270" />
  </g>
  
  <!-- Camada interna (Núcleo luminoso sutil para máximo contraste e legibilidade) -->
  <g fill="none" stroke="#ffb3c6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 312 100 A 150 150 0 1 0 312 300" />
    <path d="M 150 130 L 150 247 A 23 23 0 0 1 104 247 L 104 225" />
    <path d="M 172 130 L 172 270 M 218 130 L 218 270 M 172 200 L 218 200" />
    <path d="M 240 270 L 240 130 L 263 200 L 286 130 L 286 270" />
  </g>
</svg>
