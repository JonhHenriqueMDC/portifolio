<svg viewBox="0 0 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de glow neon focado apenas no brilho externo -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="glow1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="glow2" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="glow3" />
      <feMerge>
        <feMergeNode in="glow3" />
        <feMergeNode in="glow2" />
        <feMergeNode in="glow1" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- CAMADA 1: O GLOW (Desfocado, no fundo) -->
    <!-- Usamos um vermelho intenso para o brilho -->
    <g stroke="#ff003c" stroke-width="18" filter="url(#neon-glow)">
      <!-- Letra C (Abertura clara e distante do M) -->
      <path d="M 313 87 A 160 160 0 1 0 313 313" />
      <!-- Letra J -->
      <path d="M 160 110 L 160 265 A 25 25 0 0 1 110 265 L 110 245" />
      <!-- Letra H -->
      <path d="M 175 110 L 175 290 M 225 110 L 225 290 M 175 200 L 225 200" />
      <!-- Letra M -->
      <path d="M 240 290 L 240 110 L 265 200 L 290 110 L 290 290" />
    </g>

    <!-- CAMADA 2: O NÚCLEO SÓLIDO (Fica nítido por cima do brilho) -->
    <!-- Exatamente o mesmo path, mas sem o filtro, para dar aquele visual sólido da sua referência -->
    <g stroke="#ff1a4a" stroke-width="18">
      <!-- Letra C -->
      <path d="M 313 87 A 160 160 0 1 0 313 313" />
      <!-- Letra J -->
      <path d="M 160 110 L 160 265 A 25 25 0 0 1 110 265 L 110 245" />
      <!-- Letra H -->
      <path d="M 175 110 L 175 290 M 225 110 L 225 290 M 175 200 L 225 200" />
      <!-- Letra M -->
      <path d="M 240 290 L 240 110 L 265 200 L 290 110 L 290 290" />
    </g>

  </g>
</svg>